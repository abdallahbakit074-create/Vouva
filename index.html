<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOUVA Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #007bff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #000; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        /* شريط البحث العلوي */
        .search-area {
            position: absolute; top: 15px; left: 5%; width: 90%; z-index: 100;
            background: rgba(255, 255, 255, 0.95); padding: 8px 15px;
            border-radius: 30px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .search-area input { border: none; background: transparent; flex: 1; outline: none; font-size: 16px; padding: 5px; }
        .search-area i { color: var(--main-blue); font-size: 20px; cursor: pointer; margin-left: 10px; }

        /* منطقة الكاميرا */
        .camera-box { flex: 1; display: flex; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* زر التصوير السفلي */
        .footer-controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .snap-circle { 
            width: 80px; height: 80px; background: white; border-radius: 50%; 
            border: 6px solid rgba(0,0,0,0.1); box-shadow: 0 0 0 4px white; cursor: pointer; 
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="search-area">
        <input type="text" id="userInput" placeholder="ابحث في VOUVA...">
        <i class="fas fa-search" onclick="doSearch()"></i>
    </div>
    
    <div class="camera-box">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div class="footer-controls">
        <div class="snap-circle" onclick="takeSnap()"></div>
    </div>
</div>

<script>
    const webcam = document.getElementById('webcam');

    // تشغيل الكاميرا فوراً
    async function startApp() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });
            webcam.srcObject = stream;
        } catch (err) {
            alert("⚠️ يرجى تفعيل الكاميرا من إعدادات Safari على الآيفون");
        }
    }

    function doSearch() {
        const val = document.getElementById('userInput').value;
        if(val) alert("🔍 جاري البحث عن: " + val);
    }

    function takeSnap() {
        alert("📸 تم التقاط الصورة بنجاح في VOUVA!");
    }

    window.onload = startApp;
</script>

</body>
</html>

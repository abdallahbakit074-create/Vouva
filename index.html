<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOUVA Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --blue-primary: #007bff;
            --blue-soft: #e7f3ff;
            --blue-header: #0056b3;
            --wa-chat-bg: #f0f4f8;
            --bubble-sent: #cfe2ff;
            --bubble-rcvd: #ffffff;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; overflow: hidden; }
        
        /* الهيدر الجديد VOUVA */
        .app-header { background: var(--blue-header); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .app-header h2 { margin: 0; font-size: 22px; letter-spacing: 1px; }

        /* شاشة القائمة */
        #mainList { background: white; height: calc(100vh - 55px); overflow-y: auto; }
        .chat-row { display: flex; padding: 15px; border-bottom: 1px solid #f0f2f5; cursor: pointer; align-items: center; }
        .profile-pic { width: 50px; height: 50px; border-radius: 50%; background: var(--blue-primary); margin-left: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }

        /* شاشة المحادثة */
        #chatWindow { display: none; flex-direction: column; height: 100vh; background: var(--wa-chat-bg); position: fixed; inset: 0; z-index: 100; }
        .chat-top-bar { background: var(--blue-header); color: white; padding: 10px; display: flex; align-items: center; }
        .back-icon { margin-left: 15px; cursor: pointer; }

        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 10px; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: var(--bubble-sent); align-self: flex-end; border-bottom-right-radius: 2px; }
        .received { background: var(--bubble-rcvd); align-self: flex-start; border-bottom-left-radius: 2px; }

        /* الكيبورد المتصل والمنظم */
        #customKb { background: #d1d4d9; display: none; padding: 4px; border-top: 1px solid #adb5bd; }
        .kb-line { display: flex; justify-content: center; margin-bottom: 2px; }
        .kb-key { 
            background: white; 
            flex: 1; 
            margin: 1px; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 18px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.15);
        }
        .kb-key:active { background: #e2e6ea; }
        .kb-ctrl { background: #f8f9fa; font-size: 13px; font-weight: bold; color: var(--blue-header); flex: 1.2; }

        /* منطقة الإدخال */
        .input-footer { background: #f0f2f5; padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
        .text-box { flex: 1; background: white; border: none; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        .send-round { background: var(--blue-primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="listPage">
        <div class="app-header">
            <h2>VOUVA</h2>
            <div><i class="fas fa-camera"></i> &nbsp;&nbsp; <i class="fas fa-search"></i></div>
        </div>
        <div id="mainList">
            <div class="chat-row" onclick="startChat('VOUVA AI', 'V')">
                <div class="profile-pic">V</div>
                <div style="flex:1">
                    <div style="display:flex; justify-content:space-between"><b>VOUVA AI</b> <small style="color:var(--blue-primary)">الآن</small></div>
                    <div style="color:#666; font-size:13px">أهلاً بك! أنا VOUVA، مساعدك الذكي بالأزرق.</div>
                </div>
            </div>
        </div>
    </div>

    <div id="chatWindow">
        <div class="chat-top-bar">
            <i class="fas fa-arrow-right back-icon" onclick="goBack()"></i>
            <div class="profile-pic" style="width:35px; height:35px; font-size:16px; margin-left:10px;">V</div>
            <b>VOUVA AI</b>
        </div>
        
        <div id="messages"></div>

        <div id="customKb">
            <div id="kb-content"></div>
            <div class="kb-line">
                <div class="kb-key kb-ctrl" onclick="setLang('ar')">عربي</div>
                <div class="kb-key kb-ctrl" onclick="setLang('en')">EN</div>
                <div class="kb-key kb-ctrl" onclick="setLang('emoji')">😊</div>
                <div class="kb-key" style="flex:4" onclick="press(' ')">Space</div>
                <div class="kb-key" style="flex:1.2; background:#f8d7da; color:#721c24" onclick="del()">⌫</div>
            </div>
        </div>

        <div class="input-footer">
            <i class="far fa-keyboard" onclick="toggleKB()" style="font-size:24px; color:#54656f; cursor:pointer;"></i>
            <input type="text" id="msgInput" class="text-box" placeholder="مراسلة" readonly>
            <button onclick="pushMsg()" class="send-round"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const msgIn = document.getElementById('msgInput');
        const msgBox = document.getElementById('messages');
        let currentLang = 'ar';

        const layouts = {
            'ar': ["أبتثجحخد", "ذرزسشصضطظ", "عغفقكلمنهوي"],
            'en': ["qwertyuiop", "asdfghjkl", "zxcvbnm"],
            'emoji': ["😀😍😎👏🔥", "🚀🍳🤖🏥🌟", "❤️👍🎉💡💻"]
        };

        function startChat(name, icon) {
            document.getElementById('listPage').style.display = 'none';
            document.getElementById('chatWindow').style.display = 'flex';
            if(msgBox.children.length === 0) {
                addMsg("مرحباً بك في VOUVA! أنا مساعدك الذكي بتصميمك الجديد.", 'received');
            }
        }

        function goBack() {
            document.getElementById('listPage').style.display = 'block';
            document.getElementById('chatWindow').style.display = 'none';
        }

        function addMsg(txt, type) {
            const d = document.createElement('div');
            d.className = `bubble ${type}`;
            d.innerText = txt;
            msgBox.appendChild(d);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        function pushMsg() {
            const val = msgIn.value.trim();
            if(!val) return;
            addMsg(val, 'sent');
            msgIn.value = '';
            
            setTimeout(() => {
                let reply = "VOUVA: فكرة رائعة بلونك الأزرق الهادئ! كيف نطورها؟";
                addMsg(reply, 'received');
                const s = new SpeechSynthesisUtterance(reply);
                s.lang = 'ar-SA';
                window.speechSynthesis.speak(s);
            }, 1000);
        }

        function setLang(lang) {
            currentLang = lang;
            renderKeys();
        }

        function toggleKB() {
            const kb = document.getElementById('customKb');
            kb.style.display = (kb.style.display === 'block') ? 'none' : 'block';
            if(kb.style.display === 'block') renderKeys();
        }

        function renderKeys() {
            const area = document.getElementById('kb-content');
            area.innerHTML = '';
            layouts[currentLang].forEach(line => {
                const row = document.createElement('div');
                row.className = "kb-line";
                const chars = currentLang === 'emoji' ? Array.from(line) : line.split('');
                chars.forEach(char => {
                    const k = document.createElement('div');
                    k.className = "kb-key";
                    k.innerText = char;
                    k.onclick = () => press(char);
                    row.appendChild(k);
                });
                area.appendChild(row);
            });
        }

        function press(c) { msgIn.value += c; }
        function del() { msgIn.value = msgIn.value.slice(0, -1); }
    </script>
</body>
</html>
